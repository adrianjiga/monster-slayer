<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Monster Slayer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Source+Code+Pro&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/vue@next" defer></script>
    <script type="module" src="app.js"></script>
  </head>
  <body>
    <header>
      <h1>Monster Slayer</h1>
    </header>
    <div id="game">
      <section id="monster" class="container">
        <h2 class="health-label">Monster Health</h2>
        <div class="healthbar">
          <div
            class="healthbar__value"
            :style="monsterBarStyles"
            role="progressbar"
            :aria-valuenow="monsterHealth"
            aria-valuemin="0"
            :aria-valuemax="maxHealth"
            aria-label="Monster health"
          ></div>
        </div>
      </section>
      <section id="player" class="container">
        <h2 class="health-label">Your Health</h2>
        <div class="healthbar">
          <div
            class="healthbar__value"
            :style="playerBarStyles"
            role="progressbar"
            :aria-valuenow="playerHealth"
            aria-valuemin="0"
            :aria-valuemax="maxHealth"
            aria-label="Player health"
          ></div>
        </div>
      </section>
      <section class="container" v-if="winner">
        <h2>Game Over!</h2>
        <h3 v-if="winner === 'monster'">You lost!</h3>
        <h3 v-else-if="winner === 'player'">You won!</h3>
        <h3 v-else>It's a draw!</h3>
        <button @click="startGame">Start New Game</button>
      </section>
      <section id="controls" v-else>
        <button @click="attackMonster">ATTACK</button>
        <button :disabled="isSpecialAttackDisabled" @click="specialAttackMonster">
          SPECIAL ATTACK
        </button>
        <button @click="healPlayer">HEAL</button>
        <button @click="surrender">SURRENDER</button>
      </section>
      <section id="log" class="container">
        <h2>Battle Log</h2>
        <ul aria-live="polite" aria-atomic="false" aria-relevant="additions">
          <li v-for="logMessage in logMessages" :key="logMessage.id">
            <span
              :class="{
                'log--player': logMessage.actionBy === 'player',
                'log--monster': logMessage.actionBy === 'monster'
              }"
              >{{ getActorLabel(logMessage.actionBy) }}</span
            >
            <template v-if="logMessage.actionType === 'heal'">
              heals for
              <span class="log--heal">{{ logMessage.actionValue }}</span>
            </template>
            <template v-else>
              attacks and deals
              <span class="log--damage">{{ logMessage.actionValue }}</span>
            </template>
          </li>
        </ul>
      </section>
    </div>
  </body>
</html>
